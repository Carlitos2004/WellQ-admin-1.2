services:

  # ─── Keycloak ────────────────────────────────────────────────────────────────
  # Servidor de identidad OIDC. Se importa el realm "wellq" al arrancar.
  # Admin console: http://localhost:8080  (admin / admin)
  # Usuario de prueba: admin@wellq.com / WellQ@2024
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: wellq_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-wellq.json:/opt/keycloak/data/import/realm-wellq.json:ro

  # ─── Setup de usuarios (se ejecuta una sola vez tras el arranque de Keycloak) ──
  # El script espera a que Keycloak responda antes de establecer la contraseña.
  keycloak-setup:
    image: alpine:3.19
    container_name: wellq_keycloak_setup
    depends_on:
      - keycloak
    volumes:
      - ./keycloak/setup-users.sh:/setup/setup-users.sh:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache --quiet curl && sh /setup/setup-users.sh"]
    restart: "no"

  # ─── Backend FastAPI ──────────────────────────────────────────────────────────
  # Opcional: levanta el backend en contenedor.
  # Para desarrollo local, ejecutar directamente: uvicorn app.main:app --reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wellq_backend
    env_file: ./backend/.env
    environment:
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "8000:8000"
    profiles:
      - full

volumes:
  keycloak_data:
